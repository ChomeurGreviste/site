<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Station météo</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Station météo</h1>

<div class="ligne">
<span>Température intérieure</span>
<div class="valeur" id="temp_int">-- °C</div>
</div>

<div class="ligne">
<span>Température extérieure</span>
<div class="valeur" id="temp_ext">-- °C</div>
</div>

<div class="ligne">
<span>Humidité intérieure</span>
<div class="valeur" id="hum_int">-- %</div>
</div>

<div class="ligne">
<span>Humidité extérieure</span>
<div class="valeur" id="hum_ext">-- %</div>
</div>

<div class="toggle-container">

<span>Lampe</span>

<label class="switch">
<input type="checkbox" id="lampeToggle">
<span class="slider"></span>
</label>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "API_KEY",
  authDomain: "PROJET.firebaseapp.com",
  databaseURL: "https://PROJET-default-rtdb.firebaseio.com",
  projectId: "PROJET",
  storageBucket: "PROJET.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);


/* REFERENCES FIREBASE */

const tempIntRef = ref(database, "meteo/interieur/Temp");
const humIntRef = ref(database, "meteo/interieur/Hum");

const tempExtRef = ref(database, "meteo/exterieur/Temp");
const humExtRef = ref(database, "meteo/exterieur/Hum");

const lampeRef = ref(database, "controle/lampe");


/* ELEMENTS HTML */

const tempInt = document.getElementById("temp_int");
const tempExt = document.getElementById("temp_ext");
const humInt = document.getElementById("hum_int");
const humExt = document.getElementById("hum_ext");
const lampeToggle = document.getElementById("lampeToggle");


/* LECTURE DES DONNEES */

onValue(tempIntRef, (snapshot) => {
  tempInt.innerHTML = snapshot.val() + " °C";
});

onValue(tempExtRef, (snapshot) => {
  tempExt.innerHTML = snapshot.val() + " °C";
});

onValue(humIntRef, (snapshot) => {
  humInt.innerHTML = snapshot.val() + " %";
});

onValue(humExtRef, (snapshot) => {
  humExt.innerHTML = snapshot.val() + " %";
});

onValue(lampeRef, (snapshot) => {
  lampeToggle.checked = snapshot.val();
});


/* CONTROLE LAMPE */

lampeToggle.addEventListener("change", async () => {

const snapshot = await get(lampeRef);

let valeurActuelle = snapshot.val();

set(lampeRef, !valeurActuelle);

});

</script>

</body>
</html>
