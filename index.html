<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Station météo</title>
<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>Station météo</h1>

<div class="ligne">
<span>Température intérieure</span>
<div class="valeur" id="temp_int">-- °C</div>
</div>

<div class="ligne">
<span>Température extérieure</span>
<div class="valeur" id="temp_ext">-- °C</div>
</div>

<div class="ligne">
<span>Humidité intérieure</span>
<div class="valeur" id="hum_int">-- %</div>
</div>

<div class="ligne">
<span>Humidité extérieure</span>
<div class="valeur" id="hum_ext">-- %</div>
</div>

<div class="toggle-container">

<span>Lampe</span>

<label class="switch">
<input type="checkbox" id="lampeToggle">
<span class="slider"></span>
</label>

</div>

<!-- 📈 GRAPHIQUE -->
<canvas id="graphique"></canvas>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC30Lc4qGf2pmTkjFRp03vaNJiEJevP1I0",
  authDomain: "databasemeteo-8efd3.firebaseapp.com",
  databaseURL: "https://databasemeteo-8efd3-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "databasemeteo-8efd3",
  storageBucket: "databasemeteo-8efd3.firebasestorage.app",
  messagingSenderId: "1023251176606",
  appId: "1:1023251176606:web:b4d36aed476bef52f4af8f",
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);


/* REFERENCES FIREBASE */

const tempIntRef = ref(database, "meteo/interieur/Temp");
const humIntRef = ref(database, "meteo/interieur/Hum");

const tempExtRef = ref(database, "meteo/exterieur/Temp");
const humExtRef = ref(database, "meteo/exterieur/Hum");

const lampeRef = ref(database, "controle/lampe");
const historiqueRef = ref(database, "historique");


/* ELEMENTS HTML */

const tempInt = document.getElementById("temp_int");
const tempExt = document.getElementById("temp_ext");
const humInt = document.getElementById("hum_int");
const humExt = document.getElementById("hum_ext");
const lampeToggle = document.getElementById("lampeToggle");


/* LECTURE DES DONNEES */

onValue(tempIntRef, (snapshot) => {
  tempInt.innerHTML = snapshot.val() + " °C";
});

onValue(tempExtRef, (snapshot) => {
  tempExt.innerHTML = snapshot.val() + " °C";
});

onValue(humIntRef, (snapshot) => {
  humInt.innerHTML = snapshot.val() + " %";
});

onValue(humExtRef, (snapshot) => {
  humExt.innerHTML = snapshot.val() + " %";
});

onValue(lampeRef, (snapshot) => {
  lampeToggle.checked = snapshot.val();
});


/* CONTROLE LAMPE */

lampeToggle.addEventListener("change", async () => {

const snapshot = await get(lampeRef);
let valeurActuelle = snapshot.val();
set(lampeRef, !valeurActuelle);

});


/* 📈 GRAPHIQUE */

const ctx = document.getElementById("graphique").getContext("2d");

let chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [
            { label: "Temp Int (°C)", data: [], borderWidth: 2, tension: 0.3 },
            { label: "Temp Ext (°C)", data: [], borderWidth: 2, tension: 0.3 },
            { label: "Hum Int (%)", data: [], borderWidth: 2, tension: 0.3 },
            { label: "Hum Ext (%)", data: [], borderWidth: 2, tension: 0.3 }
        ]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                labels: {
                    font: { size: 14 }
                }
            }
        }
    }
});


onValue(historiqueRef, (snapshot) => {

    const data = snapshot.val();
    if (!data) return;

    let entries = Object.values(data);

    // 🔥 garder les 50 dernières valeurs
    entries = entries.slice(-50);

    const labels = [];
    const tempIntData = [];
    const tempExtData = [];
    const humIntData = [];
    const humExtData = [];

    entries.forEach(entry => {

        // 🚫 filtre valeurs aberrantes
        if (
            entry.temp_int < -5 || entry.temp_int > 45 ||
            entry.temp_ext < -5 || entry.temp_ext > 45 ||
            entry.hum_int < 0 || entry.hum_int > 100 ||
            entry.hum_ext < 0 || entry.hum_ext > 100
        ) {
            return;
        }

        const date = new Date(entry.time * 1000);

        labels.push(date.toLocaleTimeString());

        tempIntData.push(entry.temp_int);
        tempExtData.push(entry.temp_ext);
        humIntData.push(entry.hum_int);
        humExtData.push(entry.hum_ext);

    });

    chart.data.labels = labels;
    chart.data.datasets[0].data = tempIntData;
    chart.data.datasets[1].data = tempExtData;
    chart.data.datasets[2].data = humIntData;
    chart.data.datasets[3].data = humExtData;

    chart.update();

});

</script>

</body>
</html>
