<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Connexion</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.container {
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.error {
    color: #ef4444;
    margin-top: 10px;
    font-size: 0.9em;
}
</style>

</head>

<body>

<div class="container">

<h2>Connexion</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Mot de passe">

<button id="loginBtn">Se connecter</button>
<button id="registerBtn">Créer un compte</button>

<div class="error" id="errorMsg"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyC30Lc4qGf2pmTkjFRp03vaNJiEJevP1I0",
  authDomain: "databasemeteo-8efd3.firebaseapp.com",
  projectId: "databasemeteo-8efd3",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* HTML */
const email = document.getElementById("email");
const password = document.getElementById("password");
const errorMsg = document.getElementById("errorMsg");

/* LOGIN */
document.getElementById("loginBtn").addEventListener("click", async () => {

  errorMsg.innerHTML = "";

  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    window.location.href = "app.html";
  } catch (error) {

    if (error.code === "auth/user-not-found") {
      errorMsg.innerHTML = "Utilisateur inexistant";
    } else if (error.code === "auth/wrong-password") {
      errorMsg.innerHTML = "Mot de passe incorrect";
    } else {
      errorMsg.innerHTML = "Erreur : " + error.message;
    }

  }

});

/* REGISTER */
document.getElementById("registerBtn").addEventListener("click", async () => {

  errorMsg.innerHTML = "";

  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
    errorMsg.style.color = "#22c55e";
    errorMsg.innerHTML = "Compte créé avec succès !";
  } catch (error) {

    if (error.code === "auth/email-already-in-use") {
      errorMsg.innerHTML = "Email déjà utilisé";
    } else if (error.code === "auth/weak-password") {
      errorMsg.innerHTML = "Mot de passe trop faible (min 6 caractères)";
    } else {
      errorMsg.innerHTML = "Erreur : " + error.message;
    }

  }

});

/* AUTO REDIRECTION SI DEJA CONNECTÉ */
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "app.html";
  }
});

</script>

</body>
</html>
