<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Station météo</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
canvas {
    width: 100%;
    height: 600px;
}

.refresh-control {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}
</style>

</head>

<body>

<div class="container">

<h1>Station météo</h1>

<div class="ligne"><span>Température intérieure</span><div id="temp_int">--</div></div>
<div class="ligne"><span>Température extérieure</span><div id="temp_ext">--</div></div>
<div class="ligne"><span>Humidité intérieure</span><div id="hum_int">--</div></div>
<div class="ligne"><span>Humidité extérieure</span><div id="hum_ext">--</div></div>

<div>
<span>Lampe</span>
<input type="checkbox" id="lampeToggle">
</div>

<div class="refresh-control">
<input type="number" id="intervalInput" value="60000">
<button id="applyInterval">Appliquer</button>
</div>

<p id="stats_temp"></p>
<p id="stats_hum"></p>

<canvas id="graphique"></canvas>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, get, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIza...",
  authDomain: "...",
  databaseURL: "...",
  projectId: "..."
});

const db = getDatabase(app);

/* REFS */
const historiqueRef = ref(db, "historique");

/* HTML */
const tempInt = document.getElementById("temp_int");
const tempExt = document.getElementById("temp_ext");
const humInt = document.getElementById("hum_int");
const humExt = document.getElementById("hum_ext");
const lampeToggle = document.getElementById("lampeToggle");

let tI, tE, hI, hE;

/* LECTURE */
onValue(ref(db,"meteo/interieur/Temp"), s => { tI=parseFloat(s.val()); tempInt.innerHTML=tI+" °C"; });
onValue(ref(db,"meteo/exterieur/Temp"), s => { tE=parseFloat(s.val()); tempExt.innerHTML=tE+" °C"; });
onValue(ref(db,"meteo/interieur/Hum"), s => { hI=parseFloat(s.val()); humInt.innerHTML=hI+" %"; });
onValue(ref(db,"meteo/exterieur/Hum"), s => { hE=parseFloat(s.val()); humExt.innerHTML=hE+" %"; });

onValue(ref(db,"controle/lampe"), s => lampeToggle.checked=s.val());

lampeToggle.addEventListener("change", async ()=>{
  const snap = await get(ref(db,"controle/lampe"));
  set(ref(db,"controle/lampe"), !snap.val());
});

/* GRAPH */
const chart = new Chart(document.getElementById("graphique"), {
  type: "line",
  data: { labels: [], datasets: [
    { label:"Temp Int", data:[], yAxisID:'yTemp', borderWidth:3 },
    { label:"Temp Ext", data:[], yAxisID:'yTemp', borderDash:[5,5] },
    { label:"Hum Int", data:[], yAxisID:'yHum' },
    { label:"Hum Ext", data:[], yAxisID:'yHum', borderDash:[5,5] }
  ]},
  options:{
    responsive:true,
    maintainAspectRatio:false,
    scales:{
      yTemp:{ position:'left', suggestedMin:-5, suggestedMax:45 },
      yHum:{ position:'right', suggestedMin:0, suggestedMax:100, grid:{drawOnChartArea:false}},
      x:{ ticks:{ callback:(val,i,t)=>t[i].label.slice(0,5) } }
    }
  }
});

/* AFFICHAGE HISTORIQUE */
onValue(historiqueRef, snap => {

  let entries = Object.values(snap.val() || {}).sort((a,b)=>a.time-b.time).slice(-20);

  let labels=[], a=[], b=[], c=[], d=[];

  entries.forEach(e=>{
    labels.push(new Date(e.time*1000).toLocaleTimeString());
    a.push(e.temp_int);
    b.push(e.temp_ext);
    c.push(e.hum_int);
    d.push(e.hum_ext);
  });

  chart.data.labels=labels;
  chart.data.datasets[0].data=a;
  chart.data.datasets[1].data=b;
  chart.data.datasets[2].data=c;
  chart.data.datasets[3].data=d;
  chart.update();

});

/* 🔥 ENREGISTREMENT + NETTOYAGE */
async function saveData(){

  if([tI,tE,hI,hE].some(v=>isNaN(v))) return;

  if(tI<-5||tI>45||tE<-5||tE>45||hI<0||hI>100||hE<0||hE>100) return;

  // 1. ajouter
  await push(historiqueRef,{
    time:Math.floor(Date.now()/1000),
    temp_int:tI,
    temp_ext:tE,
    hum_int:hI,
    hum_ext:hE
  });

  // 2. récupérer tout
  const snap = await get(historiqueRef);
  const data = snap.val();

  if(!data) return;

  let entries = Object.entries(data).sort((a,b)=>a[1].time-b[1].time);

  // 3. supprimer ancien
  if(entries.length > 20){

    let toDelete = entries.slice(0, entries.length - 20);

    await Promise.all(
      toDelete.map(([key]) => remove(ref(db,"historique/"+key)))
    );

    console.log("Anciennes valeurs supprimées");
  }
}

/* INTERVAL */
let intervalTime = 60000;
let intervalID;

function startInterval(){
  if(intervalID) clearInterval(intervalID);
  intervalID = setInterval(saveData, intervalTime);
}

startInterval();

/* CONTROLE INTERVAL */
document.getElementById("applyInterval").onclick = ()=>{
  let v = parseInt(document.getElementById("intervalInput").value);
  if(isNaN(v)||v<1000) return alert("Min 1000ms");
  intervalTime=v;
  startInterval();
};

</script>

</body>
</html>
