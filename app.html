<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Station météo</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* MENU */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.menu {
    position: relative;
}

.menu-button {
    font-size: 24px;
    cursor: pointer;
}

.menu-content {
    position: absolute;
    right: 0;
    background: #1e293b;
    border-radius: 10px;
    display: none;
    flex-direction: column;
    min-width: 150px;
}

.menu-content button {
    background: none;
    border: none;
    color: white;
    padding: 10px;
    text-align: left;
    cursor: pointer;
}

.menu-content button:hover {
    background: #334155;
}

.show {
    display: flex;
}
</style>

</head>

<body>

<div class="container">

<!-- 🔝 TOP BAR -->
<div class="topbar">
<h1>Station météo</h1>

<div class="menu">
<div class="menu-button" id="menuBtn">☰</div>

<div class="menu-content" id="menuContent">
<button id="historiqueBtn">📊 Historique avancé</button>
<button id="logoutBtn">🚪 Déconnexion</button>
</div>

</div>
</div>

<!-- 📊 DONNÉES -->
<div class="ligne"><span>Température intérieure</span><div class="valeur" id="temp_int">--</div></div>
<div class="ligne"><span>Température extérieure</span><div class="valeur" id="temp_ext">--</div></div>
<div class="ligne"><span>Humidité intérieure</span><div class="valeur" id="hum_int">--</div></div>
<div class="ligne"><span>Humidité extérieure</span><div class="valeur" id="hum_ext">--</div></div>

<div class="toggle-container">
<span>Lampe</span>
<label class="switch">
<input type="checkbox" id="lampeToggle">
<span class="slider"></span>
</label>
</div>

<div class="stats">
<p id="stats_temp"></p>
<p id="stats_hum"></p>
</div>

<canvas id="graphique"></canvas>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, get, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSyC30Lc4qGf2pmTkjFRp03vaNJiEJevP1I0",
  authDomain: "databasemeteo-8efd3.firebaseapp.com",
  databaseURL: "https://databasemeteo-8efd3-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "databasemeteo-8efd3"
});

const db = getDatabase(app);
const auth = getAuth(app);

/* 🔐 PROTECTION PAGE */
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  }
});

/* MENU */
const menuBtn = document.getElementById("menuBtn");
const menuContent = document.getElementById("menuContent");

menuBtn.onclick = () => {
  menuContent.classList.toggle("show");
};

document.getElementById("logoutBtn").onclick = () => {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};

document.getElementById("historiqueBtn").onclick = () => {
  alert("Page historique avancé à venir");
};

/* REFERENCES */
const tempIntRef = ref(db, "meteo/interieur/Temp");
const humIntRef = ref(db, "meteo/interieur/Hum");
const tempExtRef = ref(db, "meteo/exterieur/Temp");
const humExtRef = ref(db, "meteo/exterieur/Hum");
const lampeRef = ref(db, "controle/lampe");
const historiqueRef = ref(db, "historique");

/* HTML */
const tempInt = document.getElementById("temp_int");
const tempExt = document.getElementById("temp_ext");
const humInt = document.getElementById("hum_int");
const humExt = document.getElementById("hum_ext");
const lampeToggle = document.getElementById("lampeToggle");

const statsTemp = document.getElementById("stats_temp");
const statsHum = document.getElementById("stats_hum");

/* VARIABLES */
let tI, tE, hI, hE;

/* TEMPS REEL */
onValue(tempIntRef, s => { tI=parseFloat(s.val()); tempInt.innerHTML=tI+" °C"; });
onValue(tempExtRef, s => { tE=parseFloat(s.val()); tempExt.innerHTML=tE+" °C"; });
onValue(humIntRef, s => { hI=parseFloat(s.val()); humInt.innerHTML=hI+" %"; });
onValue(humExtRef, s => { hE=parseFloat(s.val()); humExt.innerHTML=hE+" %"; });
onValue(lampeRef, s => lampeToggle.checked=s.val());

lampeToggle.addEventListener("change", async ()=>{
  const snap = await get(lampeRef);
  set(lampeRef, !snap.val());
});

/* GRAPH */
const chart = new Chart(document.getElementById("graphique"), {
  type: "line",
  data: { labels: [], datasets: [
    { label:"Temp Int", data:[], yAxisID:'yTemp' },
    { label:"Temp Ext", data:[], yAxisID:'yTemp' },
    { label:"Hum Int", data:[], yAxisID:'yHum' },
    { label:"Hum Ext", data:[], yAxisID:'yHum' }
  ]},
  options:{
    scales:{
      yTemp:{ position:'left', suggestedMin:-5, suggestedMax:45 },
      yHum:{ position:'right', suggestedMin:0, suggestedMax:100, grid:{drawOnChartArea:false} }
    }
  }
});

/* HISTORIQUE */
onValue(historiqueRef, snap => {

  let entries = Object.values(snap.val() || {})
    .sort((a,b)=>a.time-b.time)
    .slice(-20);

  let labels=[], a=[], b=[], c=[], d=[];

  entries.forEach(e => {

    if (!e) return;

    labels.push(new Date(e.time*1000).toLocaleTimeString());

    a.push(e.temp_int);
    b.push(e.temp_ext);
    c.push(e.hum_int);
    d.push(e.hum_ext);

  });

  chart.data.labels=labels;
  chart.data.datasets[0].data=a;
  chart.data.datasets[1].data=b;
  chart.data.datasets[2].data=c;
  chart.data.datasets[3].data=d;
  chart.update();

});

/* SAVE + LIMIT 20 */
async function saveData(){

  if([tI,tE,hI,hE].some(v=>isNaN(v))) return;

  if(tI<-5||tI>45||tE<-5||tE>45||hI<0||hI>100||hE<0||hE>100) return;

  await push(historiqueRef,{
    time:Math.floor(Date.now()/1000),
    temp_int:tI,
    temp_ext:tE,
    hum_int:hI,
    hum_ext:hE
  });

  const snap = await get(historiqueRef);
  const data = snap.val();
  if(!data) return;

  let entries = Object.entries(data).sort((a,b)=>a[1].time-b[1].time);

  if(entries.length > 20){

    let toDelete = entries.slice(0, entries.length-20);

    await Promise.all(
      toDelete.map(([k])=>remove(ref(db,"historique/"+k)))
    );
  }
}

setInterval(saveData, 60000);

</script>

</body>
</html>
